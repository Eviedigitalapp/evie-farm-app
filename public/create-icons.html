<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="canvas192" width="192" height="192"></canvas>
<canvas id="canvas512" width="512" height="512"></canvas>
<script>
function createIcon(canvasId, size) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  
  // Green background
  ctx.fillStyle = '#16a34a';
  ctx.fillRect(0, 0, size, size);
  
  // White plant icon
  ctx.fillStyle = 'white';
  const scale = size / 192;
  
  // Leaf
  ctx.beginPath();
  ctx.moveTo(size/2, size/4);
  ctx.quadraticCurveTo(size/2 - size/8, size/3, size/2 - size/8, size/2.2);
  ctx.quadraticCurveTo(size/2 - size/8, size/2, size/2, size/2);
  ctx.quadraticCurveTo(size/2 + size/8, size/2, size/2 + size/8, size/2.2);
  ctx.quadraticCurveTo(size/2 + size/8, size/3, size/2, size/4);
  ctx.fill();
  
  // Stem
  ctx.fillRect(size/2 - 4*scale, size/2, 8*scale, size/3);
  
  console.log('Download:', canvasId, canvas.toDataURL());
}
createIcon('canvas192', 192);
createIcon('canvas512', 512);
</script>
<p>Icons created. Check browser console for data URLs or right-click canvases to save.</p>
</body>
</html>
